name: ledra-demo-production

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  LEDRA_REGISTRY_PATH: packages/sample-data/registry
  CLOUDFLARE_WORKER_NAME: ledra-demo

jobs:
  build-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build repository
        run: npm run build

      - name: Run deploy-focused smoke tests
        run: >-
          node --test
          tests/cloudflare-package.test.mjs
          tests/cloudflare-worker.test.mjs
          tests/managed-hosting-contracts.test.mjs
          tests/managed-hosting-github.test.mjs
          tests/managed-hosting-onboarding.test.mjs
          tests/managed-hosting-deployment.test.mjs
          tests/managed-hosting-operator.test.mjs
          tests/managed-hosting-subscription.test.mjs

      - name: Validate demo registry
        run: npm exec --workspace @ledra/cli ledra -- validate --registry "${{ github.workspace }}/${{ env.LEDRA_REGISTRY_PATH }}"

      - name: Export demo bundle
        run: npm exec --workspace @ledra/cli ledra -- export --registry "${{ github.workspace }}/${{ env.LEDRA_REGISTRY_PATH }}" --out ".artifacts/cloudflare/bundle.json"

      - name: Package Cloudflare assets
        run: >-
          node scripts/package-cloudflare.mjs
          --bundle .artifacts/cloudflare/bundle.json
          --out deploy/cloudflare/public
          --repo "${{ github.repository }}"
          --ref "${{ github.ref }}"
          --commit "${{ github.sha }}"
          --registry-path "${{ env.LEDRA_REGISTRY_PATH }}"

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: ledra-demo-package
          path: deploy/cloudflare/public

  deploy-demo:
    needs: build-demo
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          name: ledra-demo-package
          path: deploy/cloudflare/public

      - name: Render production Wrangler config
        run: >-
          node scripts/render-production-wrangler.mjs
          --input deploy/cloudflare/wrangler.toml.example
          --output deploy/cloudflare/wrangler.toml
          --worker-name "${{ env.CLOUDFLARE_WORKER_NAME }}"
          --hostname "${{ vars.CLOUDFLARE_PRODUCTION_HOSTNAME }}"

      - name: Deploy demo to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deploy/cloudflare
          command: deploy --env production

      - name: Verify demo health
        run: |
          curl --fail --silent --show-error "https://${{ vars.CLOUDFLARE_PRODUCTION_HOSTNAME }}/health"
          curl --fail --silent --show-error "https://${{ vars.CLOUDFLARE_PRODUCTION_HOSTNAME }}/bundle.json" >/dev/null
          curl --fail --silent --show-error "https://${{ vars.CLOUDFLARE_PRODUCTION_HOSTNAME }}/api/views" >/dev/null
          curl --fail --silent --show-error "https://${{ vars.CLOUDFLARE_PRODUCTION_HOSTNAME }}/api/metadata" >/dev/null
